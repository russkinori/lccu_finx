name: lccu_finx
description: "LCCU FinX — secure school savings management for La Borie Credit Union."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.12.4
  intl: ^0.20.2
  file_picker: ^10.3.3
  csv: ^6.0.0
  text_responsive: ^1.2.1
  responsive_text_widget: ^0.0.2
  share_plus: ^12.0.1
  uuid: ^4.5.1
  url_launcher: ^6.1.10
  auto_size_text: ^3.0.0
  flutter_jailbreak_detection: ^1.8.0

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.4"
  change_app_package_name: ^1.5.0
  rename: ^3.1.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/launcher_icon.png"
  remove_alpha_ios: true
  adaptive_icon:
    foreground_image_path: "assets/images/launcher_icon.png"
    background_color: "#000000"


#   web:
#     generate: true
#     image_path: "assets/images/icon.png"
#     background_color: "#hexcode"
#     theme_color: "#hexcode"


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
  - assets/images/
  #   - images/a_dot_ham.jpeg

  